name: Generate Custom Galaga Grid Matrix

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate-asset:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      # Secure execution of your public action layout engine
      - name: Execute Galaga Compiling Script
        uses: manikeshmk/galaga-contribution-graph@v1.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy Compiled Vector Asset to Output Branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Generate Custom Galaga Grid Matrix

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate-asset:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Execute Galaga Compiling Script
        uses: manikeshmk/galaga-contribution-graph@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # Copies the file to your workspace asset path
      - name: Prepare Asset Directory
        run: |
          mkdir -p assets
          cp dist/galaga.svg assets/galaga.svg

      # Uses an official action to automatically sync and commit cleanly
      - name: Commit and Push SVG Asset
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: updated live galaga animation grid matrix asset"
          file_pattern: 'assets/galaga.svg'
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"

name: Generate Custom Galaga Grid Matrix

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate-asset:
    permissions:
      contents: write # Explicitly grants write permissions to your workflow
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      # Runs your public action to compile the SVG file
      - name: Execute Galaga Compiling Script
        uses: manikeshmk/galaga-contribution-graph@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # Securely commits the generated file directly to your main branch's asset folder
      - name: Commit and Push SVG Asset to Main
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p assets
          cp dist/galaga.svg assets/galaga.svg
          git add assets/galaga.svg
          git commit -m "chore: updated live galaga animation grid matrix asset" || exit 0
          git push origin main

name: Generate Custom Galaga Grid Matrix

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate-asset:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Execute Galaga Compiling Script
        uses: manikeshmk/galaga-contribution-graph@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and Push SVG Asset to Main
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 1. Stage the compiled vector grid matrix
          mkdir -p assets
          cp dist/galaga.svg assets/galaga.svg
          git add assets/galaga.svg
          
          # 2. Fix divergence by pulling the workflow updates you just pushed to GitHub
          git pull origin main --rebase --autostash
          
          # 3. Commit and safely push to the updated remote HEAD
          if ! git diff --cached --quiet; then
            git commit -m "chore: updated live galaga animation grid matrix asset"
            git push origin main
          else
            echo "No asset changes detected."
          fi

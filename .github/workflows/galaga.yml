name: Generate Custom Galaga Grid Matrix

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate-asset:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Execute Galaga Compiling Script
        uses: manikeshmk/galaga-contribution-graph@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and Push SVG Asset to Main
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Ensure target folders are structured cleanly
          mkdir -p assets
          cp dist/galaga.svg assets/galaga.svg
          git add assets/galaga.svg
          
          # Step 1: Force track and sync with remote HEAD changes right before committing
          git fetch origin main
          git rebase origin/main
          
          # Step 2: Push changes securely if modifications exist
          if ! git diff --cached --quiet; then
            git commit -m "chore: updated live galaga animation grid matrix asset"
            git push origin main
          else
            echo "No changes detected in the contribution matrix layout tracking."
          fi

name: Generate Custom Galaga Grid Matrix

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate-asset:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Execute Galaga Compiling Script
        uses: manikeshmk/galaga-contribution-graph@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # Copies from the local repo workspace, matches the exact path behavior of your snake graph
      - name: Commit and Push SVG Asset to Main
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p assets
          cp dist/galaga.svg assets/galaga.svg
          git add assets/galaga.svg
          
          # Check for changes cleanly without hard-breaking the runner step execution flow
          if ! git diff --cached --quiet; then
            git commit -m "chore: updated live galaga animation grid matrix asset"
            git pull origin main --rebase --autostash
            git push origin main
          else
            echo "No changes detected in the contribution matrix layout tracking."
          fi

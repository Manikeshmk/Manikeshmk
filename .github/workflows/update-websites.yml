name: Update Live Websites

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"   # Weekly auto-update

permissions:
  contents: write
  pages: read
jobs:
  update-websites:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Generate website links
        run: node .github/scripts/list-pages.js

      - name: Update README
        run: node .github/scripts/update-readme.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md website-links.md
          git commit -m "Auto-update live website portfolio" || echo "No changes"
          git push

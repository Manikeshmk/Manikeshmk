<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="300" height="300" fill="#0f172a"/>
  
  <path id="rectPath" d="M20,20 H280 V280 H20 Z" fill="none"/>

  <rect x="80" y="130" width="140" height="90" rx="10" fill="#1e293b" stroke="#2afadf" stroke-width="3">
    <animate attributeName="stroke" values="#2afadf;#ff6f61;#2afadf" dur="3s" repeatCount="indefinite"/>
  </rect>
  <text x="150" y="170" text-anchor="middle" fill="#2afadf" font-size="20" font-family="monospace">&lt;/&gt;
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 20; 0 0" dur="1.5s" repeatCount="indefinite"/>
    </text>

  <g>
    <animateTransform attributeName="transform" type="translate" values="0 40; 0 50; 0 40" dur="1.5s" repeatCount="indefinite"/>
    <circle cx="150" cy="60" r="30" fill="#facc15"/>
    <polygon points="120,35 135,15 150,35" fill="#facc15"/>
    <polygon points="150,35 165,15 180,35" fill="#facc15"/>
    <circle cx="140" cy="55" r="4" fill="#000"/><circle cx="160" cy="55" r="4" fill="#000"/>
  </g>

  <text id="role" x="150" y="245" text-anchor="middle" fill="#00ffff" font-size="16" font-family="monospace"></text>
  <g font-family="monospace" font-size="16" fill="#00ffff" text-anchor="middle">
    <text x="150" y="245">Web Developer<animate attributeName="opacity" values="1;0;0;0;0" dur="10s" repeatCount="indefinite" keyTimes="0;0.2;0.21;0.99;1"/></text>
    <text x="150" y="245" opacity="0">Data Scientist<animate attributeName="opacity" values="0;1;0;0;0" dur="10s" repeatCount="indefinite" keyTimes="0;0.2;0.4;0.41;1"/></text>
    <text x="150" y="245" opacity="0">ML Engineer<animate attributeName="opacity" values="0;0;1;0;0" dur="10s" repeatCount="indefinite" keyTimes="0;0.4;0.6;0.61;1"/></text>
    <text x="150" y="245" opacity="0">AI Enthusiast<animate attributeName="opacity" values="0;0;0;1;0" dur="10s" repeatCount="indefinite" keyTimes="0;0.6;0.8;0.81;1"/></text>
    <text x="150" y="245" opacity="0">Python Lover<animate attributeName="opacity" values="0;0;0;0;1" dur="10s" repeatCount="indefinite" keyTimes="0;0.8;0.95;1;1"/></text>
  </g>

  <text font-family="monospace" font-size="12" fill="#38bdf8">
    <textPath href="#rectPath" startOffset="0">
      Web Developement • Data Science • ML • AI • Generative AI • UI/UX Designer • Python • Java • React • Web Developement • Data Science • ML • AI • Generative AI • UI/UX Designer • Python • Java • React • 
      <animate attributeName="startOffset" from="-570" to="0" dur="10s" repeatCount="indefinite"/>
    </textPath>
  </text>

</svg>
